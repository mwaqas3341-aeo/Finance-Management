<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --bg2: #111820;
            --bg3: #1a2333;
            --border: rgba(255,255,255,0.08);
            --text: #e8f0fe;
            --text2: #8fa0bc;
            --text3: #4a5d7a;
            --azure: #4d9fff;
            --emerald: #00d68f;
            --rose: #ff4d6d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text2);
            font-size: 0.82rem;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 6px;
            margin-top: 12px;
        }

        input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--azure);
        }

        button {
            width: 100%;
            padding: 13px;
            background: var(--azure);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
        }

        button:hover { background: #6db3ff; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .error {
            color: var(--rose);
            font-size: 0.78rem;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.75rem;
        }

        .status.success {
            background: rgba(0,214,143,0.1);
            color: var(--emerald);
        }

        .status.error {
            background: rgba(255,77,109,0.1);
            color: var(--rose);
        }

        .info {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.72rem;
            color: var(--text3);
        }

        code {
            background: var(--bg3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
        }
    </style>
</head>
<body>

<div class="container" id="loginContainer">
    <h2>📒 Finance Ledger</h2>
    <p class="subtitle">Multi-User Finance Tracker</p>
    
    <div class="status" id="connectionStatus">
        Checking connection...
    </div>
    
    <label for="loginCNIC">CNIC Number</label>
    <input type="text" id="loginCNIC" placeholder="32202-2278742-5" maxlength="15" autocomplete="off">
    
    <label for="loginPIN">PIN Code</label>
    <input type="password" id="loginPIN" placeholder="••••" maxlength="4" autocomplete="off">
    
    <button id="loginBtn" onclick="handleLogin()">🔐 Sign In</button>
    <div class="error" id="loginError"></div>
    
    <div class="info">
        <p>Your CNIC: <code>3220222787425</code></p>
        <p>Your PIN: <code>4455</code></p>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// ⚠️ REPLACE THIS WITH YOUR ACTUAL GAS URL
// ═══════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8jvGVOSod2YF9pPMlehBV8TUcO1r2CpqUbOxy4fAuZGXOAO0E0DNDcHKs6RQsCmOmMw/exec';

// ═══════════════════════════════════════════
// Check if URL is configured
// ═══════════════════════════════════════════
if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    document.getElementById('connectionStatus').className = 'status error';
    document.getElementById('connectionStatus').textContent = 
        '⚠️ Please configure SCRIPT_URL with your Google Apps Script Web App URL';
    document.getElementById('loginBtn').disabled = true;
}

// ═══════════════════════════════════════════
// API Call Function
// ═══════════════════════════════════════════
async function callGAS(functionName, params = {}) {
    const url = new URL(SCRIPT_URL);
    
    // Add function name and parameters
    const payload = {
        function: functionName,
        parameters: params
    };
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            mode: 'no-cors', // Important for cross-origin requests
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json',
            },
            redirect: 'follow',
            body: JSON.stringify(payload)
        });
        
        // With no-cors, we can't read the response directly
        // We need to use a different approach
        return { success: true, message: 'Request sent' };
        
    } catch (error) {
        console.error('API Error:', error);
        throw error;
    }
}

// ═══════════════════════════════════════════
// Alternative: Use JSONP-style callback
// ═══════════════════════════════════════════
function callGASWithCallback(functionName, params, callback) {
    // Create a unique callback name
    const callbackName = 'gasCallback_' + Date.now();
    
    // Store callback
    window[callbackName] = function(response) {
        callback(response);
        // Cleanup
        delete window[callbackName];
        document.getElementById('gasScript')?.remove();
    };
    
    // Build URL with parameters
    let url = SCRIPT_URL + '?callback=' + callbackName;
    url += '&function=' + encodeURIComponent(functionName);
    
    // Add parameters
    Object.keys(params).forEach(key => {
        url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
    });
    
    // Create script tag
    const script = document.createElement('script');
    script.id = 'gasScript';
    script.src = url;
    document.body.appendChild(script);
}

// ═══════════════════════════════════════════
// Test Connection
// ═══════════════════════════════════════════
async function testConnection() {
    if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
        return;
    }
    
    try {
        // Try to call whoAmI to test connection
        const testUrl = SCRIPT_URL + '?function=whoAmI';
        const response = await fetch(testUrl, {
            method: 'GET',
            mode: 'cors'
        });
        
        if (response.ok) {
            const data = await response.json();
            if (data && !data.error) {
                document.getElementById('connectionStatus').className = 'status success';
                document.getElementById('connectionStatus').textContent = '✅ Connected to server';
            }
        }
    } catch (e) {
        document.getElementById('connectionStatus').className = 'status error';
        document.getElementById('connectionStatus').textContent = 
            '⚠️ Cannot connect. Make sure URL is correct and web app is deployed';
    }
}

// ═══════════════════════════════════════════
// Login Function
// ═══════════════════════════════════════════
async function handleLogin() {
    const cnicInput = document.getElementById('loginCNIC');
    const pinInput = document.getElementById('loginPIN');
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    
    const cnic = cnicInput.value.replace(/\D/g, '');
    const pin = pinInput.value;
    
    errorEl.textContent = '';
    
    // Validate CNIC
    if (cnic.length !== 13) {
        errorEl.textContent = 'Please enter a valid 13-digit CNIC number';
        return;
    }
    
    // Validate PIN
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
        errorEl.textContent = 'Please enter a valid 4-digit PIN';
        return;
    }
    
    // Check if URL is configured
    if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
        errorEl.textContent = 'SCRIPT_URL not configured in the code';
        return;
    }
    
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    
    try {
        // Try direct fetch first
        const loginUrl = SCRIPT_URL + '?function=login&cnic=' + cnic + '&pin=' + pin;
        
        const response = await fetch(loginUrl, {
            method: 'GET',
            mode: 'cors',
            headers: {
                'Accept': 'application/json'
            }
        });
        
        if (!response.ok) {
            throw new Error('Server error: ' + response.status);
        }
        
        const result = await response.json();
        
        if (result.success) {
            errorEl.style.color = 'var(--emerald)';
            errorEl.textContent = '✅ Login successful! Welcome ' + result.user.name;
            
            // Store user info
            localStorage.setItem('user', JSON.stringify(result.user));
            
            // Reload or redirect
            setTimeout(() => {
                alert('Login successful!\nUser: ' + result.user.name + '\nCNIC: ' + result.user.cnic);
            }, 500);
            
        } else {
            errorEl.textContent = result.message || 'Invalid credentials';
            btn.textContent = '🔐 Sign In';
            btn.disabled = false;
        }
        
    } catch (e) {
        console.error('Login error:', e);
        errorEl.textContent = 'Connection error: ' + e.message + 
            '\n\nMake sure:\n1. SCRIPT_URL is correct\n2. Web app is deployed\n3. Web app has access set to "Anyone"';
        btn.textContent = '🔐 Sign In';
        btn.disabled = false;
    }
}

// ═══════════════════════════════════════════
// CNIC Input Formatting
// ═══════════════════════════════════════════
document.getElementById('loginCNIC').addEventListener('input', function(e) {
    let digits = this.value.replace(/\D/g, '').substring(0, 13);
    if (digits.length > 5) {
        digits = digits.substring(0, 5) + '-' + digits.substring(5);
    }
    if (digits.length > 13) {
        digits = digits.substring(0, 13) + '-' + digits.substring(13);
    }
    this.value = digits;
});

// PIN input - numbers only
document.getElementById('loginPIN').addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '').substring(0, 4);
});

// Enter key to submit
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        handleLogin();
    }
});

// Test connection on load
testConnection();
</script>

</body>
</html>
